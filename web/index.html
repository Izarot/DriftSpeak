<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>DriftSpeak</title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

  <div class="container">

    <h1>DriftSpeak</h1>

    <input
      id="inputText"
      type="text"
      placeholder="Enter word..."
    >

    <input
      id="cycleCount"
      type="number"
      placeholder="Cycles"
      value="10"
    >

    <button id="runButton">
      DriftSpeak
    </button>

    <div id="output"></div>

  </div>

  <script
    type="module"
    src="app.js"
  ></script>

</body>

</html>
