<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>DriftSpeak</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🌍 DriftSpeak</h1>
  <p>
    Powered by the Izaron Drift Engine
  </p>

  <textarea
    id="inputText"
    placeholder="Enter text..."
  ></textarea>

  <br><br>

  <input
    type="number"
    id="cycles"
    value="20"
    min="1"
    max="500"
  >

  <button id="driftButton">
    DRIFT
  </button>

  <pre id="output"></pre>

  <script type="module" src="app.js"></script>

</body>
</html>
