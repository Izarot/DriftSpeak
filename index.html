<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>DriftSpeak</title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

  <div class="backgroundGlow"></div>

  <div class="container">

    <h1>DriftSpeak</h1>

    <p class="subtitle">
      Semantic Mutation Engine
    </p>

    <div class="panel">

      <input
        id="inputText"
        type="text"
        placeholder="Enter text..."
      >

      <input
        id="cycleCount"
        type="number"
        value="10"
        min="1"
      >

      <button id="runButton">
        INITIATE DRIFT
      </button>

    </div>

    <div id="resultArea"></div>

<div
  id="historyToggle"
  class="historyToggle hidden"
>
  wanna check out the full cycle history?
  click me 👀
</div>

<div
  id="historyPanel"
  class="historyPanel hidden"
></div>

  </div>

  <script src="frontend.js"></script>

</body>

</html>
